    <main>
        <section>
             <p class="my-courses">Add Course ➕️ </p>
             <hr>
             <form>
            <div class="input">
                <div class="form-group">
                    <label class="add-course">Course Name : </label>
                    <input type="text" required>
                </div>

                <div class="form-group">
                   <label class="add-course">Instructor : </label>
                    <input type="text" required >
                </div>
                
                <div class="form-group">
                   <label class="add-course">Credit Hours : </label>
                   <input type="number" required>
                </div>
                
                 <div class="form-group" >
                   <label class="add-course">Notes : </label>
                   <input type="text" required>
                 </div>
                    <input type="submit" value="Add Course">
            </div>
            </form>
            <div class="background-in-add"></div>
        </section>
